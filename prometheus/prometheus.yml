global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'django'
    static_configs:
      - targets: ['abia-django:8000']
    metrics_path: /metrics

  - job_name: 'postgres'
    static_configs:
      - targets: ['abia-postgres:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['abia-redis:6379']

  - job_name: 'kong'
    static_configs:
      - targets: ['abia-kong:8001']
    metrics_path: /metrics
