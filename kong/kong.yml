_format_version: "3.0"
_transform: true

services:
  - name: abia-api
    url: http://abia-django:8000
    routes:
      - name: api-routes
        paths:
          - /api
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: redis
          redis_host: redis
      - name: key-auth
        config:
          key_names:
            - api-key
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
          headers:
            - Authorization
            - Content-Type
            - X-API-Version

consumers:
  - username: abia-mobile-app
    keyauth_credentials:
      - key: mobile-app-key-placeholder
