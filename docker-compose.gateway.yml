# Gateway Layer: Kong API Gateway + Nginx Reverse Proxy
# Per Architecture Contract §2.6, §5.3

services:
  abia-kong:
    image: kong:3.5
    container_name: abia-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong/declarative:/kong/declarative:ro
    networks:
      - abia-network
    depends_on:
      - abia-django
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  abia-nginx:
    image: nginx:1.25-alpine
    container_name: abia-nginx
    ports:
      - "8083:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./abia-app/staticfiles:/var/www/static:ro
    depends_on:
      - abia-kong
    networks:
      - abia-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  abia-network:
    driver: bridge
