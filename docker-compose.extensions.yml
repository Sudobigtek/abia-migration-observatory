# Extension Layer: AI + Monitoring + Decentralized
# Per Architecture Contract §2.3, §2.5, §2.6, §5.3

services:
  abia-camunda:
    image: camunda/camunda-bpm-platform:run-7.21.0
    container_name: abia-camunda
    ports:
      - "8082:8080"
    networks:
      - abia-network
    environment:
      - CAMUNDA_BPM_ADMIN_USER_ID=demo
      - CAMUNDA_BPM_ADMIN_USER_PASSWORD=demo
      - CAMUNDA_BPM_ADMIN_USER_FIRSTNAME=Demo
      - CAMUNDA_BPM_ADMIN_USER_LASTNAME=User
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:camunda;DB_CLOSE_DELAY=-1
    mem_limit: 512m
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  abia-ollama:
    image: ollama/ollama
    container_name: abia-ollama
    volumes:
      - abia-ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - abia-network
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    mem_limit: 2g
    cpus: "1.5"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:11434"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  abia-ipfs:
    image: ipfs/kubo:latest
    container_name: abia-ipfs
    volumes:
      - abia-ipfs-data:/data/ipfs
    ports:
      - "5001:5001"
      - "8081:8081"
      - "4001:4001"
    networks:
      - abia-network
    environment:
      - IPFS_PROFILE=server
      - IPFS_SWARM_KEY=/key/swarm
    mem_limit: 256m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 30s
      timeout: 10s
      retries: 3

  abia-prometheus:
    image: prom/prometheus:latest
    container_name: abia-prometheus
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - abia-prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - abia-network
    mem_limit: 256m
    cpus: "0.5"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  abia-grafana:
    image: grafana/grafana:latest
    container_name: abia-grafana
    ports:
      - "3000:3000"
    volumes:
      - abia-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - abia-network
    mem_limit: 256m
    cpus: "0.5"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    depends_on:
      - abia-prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  abia-ollama-data:
    driver: local
  abia-ipfs-data:
    driver: local
  abia-prometheus-data:
    driver: local
  abia-grafana-data:
    driver: local

networks:
  abia-network:
    driver: bridge
